{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="container-xl py-5 text-center" style="min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
  <div style="font-size:5rem;color:var(--ibm-blue);margin-bottom:1rem;">
    <i class="bi bi-exclamation-triangle-fill"></i>
  </div>
  <h1 class="fw-bold" style="font-size:4rem;color:var(--text-primary);">404</h1>
  <h2 class="mb-3" style="color:var(--text-secondary);">Page Not Found</h2>
  <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn btn-primary px-4">
    <i class="bi bi-house me-2"></i>Back to Home
  </a>
</div>
{% endblock %}
